{% extends "index.html" %}
{% block head %}

{% endblock %}
{% block body %}
<div class="form-container">
    <div class="form">
        <div class="form__element">
            <span class="form__element__header">Регистрация</span>
        </div>
        <div class="form__element">
            <label class="form__element__label">Ваша почта</label>
            <input type="text" class="form__element__input" id="email">
        </div>
        <div class="form__element">
            <label class="form__element__label">Ваш пароль</label>
            <input type="text" class="form__element__input" id="pwrd">
        </div>
        <div class="form__element">
            <button class="form__element__submit" onclick="onLogup()">Подтвердить</button>
        </div>
    </div>
</div>
{% endblock %}
{% block script %}
<script type="text/javascript" src="{{url_for('static', filename='js/logup.js')}}"></script>
{% endblock %}
